experiment:
  name: "default_run"
  seed: 42

sensor_budget:
  lidar:
    max_count: 2
  camera:
    max_count: 2
  radar:
    max_count: 1

sensor_models:
  lidar:
    model_name: "Velodyne VLP-16"
    cost_usd: 4000
    range_m: 100.0
    horizontal_fov_deg: 360.0
    vertical_fov_deg: 30.0
    beams: 16
    points_per_second: 300000
    mass_kg: 0.83
    blind_spot_reduction_factor: 0.85

  camera:
    model_name: "Intel RealSense D435i"
    cost_usd: 200
    range_m: 10.0
    horizontal_fov_deg: 87.0
    vertical_fov_deg: 58.0
    depth_accuracy_pct: 2.0
    mass_kg: 0.07
    blind_spot_reduction_factor: 0.45

  radar:
    model_name: "TI AWR1843BOOST"
    cost_usd: 650
    range_m: 30.0
    horizontal_fov_deg: 120.0
    vertical_fov_deg: 30.0
    mass_kg: 0.05
    blind_spot_reduction_factor: 0.60

mounting_slots:
  - front
  - rear
  - left
  - right
  - top
  - front-left
  - front-right
  - rear-left
  - rear-right

cma:
  sigma0: 0.3
  population_size: 20
  max_generations: 100
  tolx: 1e-4
  tolfun: 1e-5

loss:
  alpha: 0.4
  beta: 0.4
  gamma: 0.2
  max_cost_usd: 10000.0

inner_loop:
  mode: "dummy"
  n_episodes: 15
  max_steps_per_episode: 500
  dummy:
    noise_std: 0.05

logging:
  csv: true
  mlflow: true
  mlflow_tracking_uri: "mlruns"
  log_every_n_generations: 1
  results_dir: "results"